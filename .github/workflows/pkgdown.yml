on:
  push:
    branches:
      - main
      - master
    paths:
      - 'DESCRIPTION'
      - '**pkgdown.yml'
      - '*.md'
      - 'inst/CITATION'
      - 'inst/*.bib'
      - 'inst/treespace/app.R'
      - 'man/**.Rd'
      - 'vignettes/**.Rmd'

  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # Build the pkgdown site, export the treespace Shinylive app, and deploy.
      # The action runs `shinylive::export()` with its defaults, resolving
      # WebAssembly binaries from repo.r-wasm.org (which mirrors CRAN). This is
      # the same configuration as the working Ternary app. The app uses only
      # released-CRAN TreeDist/TreeTools API, so no custom WASM repo is needed;
      # adding one previously shipped a broken sass binary ("bad export type
      # for 'hs'") that crashed the app at load. `extra-repositories` /
      # DESCRIPTION's Additional_repositories cover dev deps for the *site*
      # build only, not the WASM bundle.
      - uses: ms609/actions/pkgdown@main
        with:
          extra-repositories: https://ms609.github.io/packages/
          shinylive-app: "inst/treespace"
