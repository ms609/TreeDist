on:
  push:
    branches:
      - main
      - master
    paths:
      - 'DESCRIPTION'
      - '**pkgdown.yml'
      - '*.md'
      - 'inst/CITATION'
      - 'inst/*.bib'
      - 'inst/treespace/app.R'
      - 'man/**.Rd'
      - 'vignettes/**.Rmd'

  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ── Build pkgdown site (no shinylive, no deploy) ──────────────
      - uses: ms609/actions/pkgdown@main
        with:
          extra-repositories: https://ms609.github.io/packages/
          deploy: 'false'

      # ── Export Shinylive app ──────────────────────────────────────
      # This replicates the action's own `shinylive::export()` defaults
      # exactly — appdir + destdir only, so WebAssembly binaries come from
      # repo.r-wasm.org (which mirrors CRAN and ships a *working* sass
      # build). We run it as our own step solely to inject the
      # packageDescription patch below, which the bare action can't do.
      #
      # Do NOT pass `repos`, `pkgs`, or a package blacklist here: listing a
      # custom WASM repo (ms609.r-universe.dev) previously shipped a broken
      # sass binary that crashed the app at load with "bad export type for
      # 'hs'".  The treespace app uses only released-CRAN TreeDist/TreeTools
      # API, so the default repo suffices.
      - name: Export Shinylive app
        shell: Rscript {0}
        run: |
          # shinylive 0.4.1 (CRAN) bundles webR with R 4.5.1.  repo.r-wasm.org
          # now ships WASM binaries compiled for R 4.6.0 (post webR 0.6.0, May
          # 2026).  Pre-bundling fastmatch with the mismatched runtime produces:
          #   LinkError: Import "R_registerRoutines" does not match expected type
          # The dev branch bundles webR 0.6.0/R 4.6.0, matching the current repo.
          # TODO: revert to install.packages("shinylive") once ≥0.4.2 is on CRAN.
          if (!requireNamespace("remotes", quietly = TRUE)) {
            install.packages("remotes")
          }
          remotes::install_github("posit-dev/r-shinylive", dependencies = FALSE)

          # ── Work around shinylive metadata bug ──
          # prepare_wasm_metadata() calls packageDescription() on every
          # package in the WebAssembly dependency closure, but the runner
          # only has packages installed by setup-r-dependencies.  For
          # closure members absent locally (e.g. bitops), packageDescription
          # returns NA, and `desc$Repository` then errors with
          # "$ operator is invalid for atomic vectors".  Stub the
          # description so metadata can be built.
          #
          # TODO: Remove once shinylive tolerates uninstalled closure members.
          local({
            real_pd <- utils::packageDescription
            ns <- asNamespace("utils")
            unlockBinding("packageDescription", ns)
            assign("packageDescription", function(pkg, lib.loc = NULL,
                  fields = NULL, drop = TRUE, encoding = "") {
              result <- real_pd(pkg, lib.loc = lib.loc, fields = fields,
                                drop = drop, encoding = encoding)
              if (identical(result, NA)) {
                message("  [shinylive patch] '", pkg,
                        "' not installed locally; stub description used")
                result <- structure(
                  list(Package = pkg, Version = "0.0.0",
                       Repository = "CRAN"),
                  class = "packageDescription"
                )
                if (!is.null(fields)) {
                  result <- result[fields]
                  if (drop && length(fields) == 1L)
                    return(result[[1L]])
                }
              }
              result
            }, envir = ns)
          })

          # ── Export (action defaults: binaries from repo.r-wasm.org) ──
          pkg_name <- read.dcf("DESCRIPTION")[, "Package"]
          app_dir  <- if (dir.exists("inst/treespace")) "inst/treespace" else
            system.file("treespace", package = pkg_name)
          stopifnot("app.R not found" =
                      file.exists(file.path(app_dir, "app.R")))

          shinylive::export(appdir = app_dir, destdir = "docs/app")
          file.create("docs/.nojekyll")

          # ── Splice webR-compatible fastmatch ──────────────────────────
          # repo.r-wasm.org ships fastmatch built from stock CRAN source,
          # whose src/dummy.c declares R_registerRoutines with a `void`
          # signature (a hack to silence a CRAN check; fastmatch really
          # registers via useDynLib).  In WebAssembly that emits a wrongly
          # typed import that fails to link against webR's runtime, so
          # TreeTools (which depends on fastmatch) cannot load and the whole
          # app dies with "R_registerRoutines: imported function does not
          # match the expected type".  Overwrite the bundled binary with one
          # rebuilt from patched source against the matching webR toolchain
          # (.github/workflows/wasm-build.yml; committed at .github/wasm/).
          #
          # The splice is version-guarded: if repo.r-wasm.org moves to a
          # fastmatch version other than the patched one, it warns instead of
          # shipping a mismatched binary — rebuild via the wasm-build workflow.
          #
          # TODO: remove once TreeTools moves fastmatch to Suggests with a
          #       base match() fallback (the durable fix).
          local({
            patched <- ".github/wasm/fastmatch_1.1-8.tgz"
            pkgdir  <- "docs/app/shinylive/webr/packages/fastmatch"
            bundled <- list.files(pkgdir, pattern = "^fastmatch_.*\\.tgz$",
                                   full.names = TRUE)
            if (!file.exists(patched)) {
              warning("fastmatch splice: patched binary missing at ", patched)
            } else if (length(bundled) != 1L) {
              warning("fastmatch splice: expected 1 bundled tgz, found ",
                      length(bundled), " in ", pkgdir)
            } else if (basename(bundled) != basename(patched)) {
              warning("fastmatch splice SKIPPED: bundled ", basename(bundled),
                      " != patched ", basename(patched),
                      " — rebuild the patch via the wasm-build workflow.")
            } else {
              file.copy(patched, bundled, overwrite = TRUE)
              message("Spliced webR-compatible fastmatch over ",
                      basename(bundled))
            }
          })

          # Build provenance marker: lets a deployment check confirm which
          # commit GitHub Pages is actually serving.
          writeLines(Sys.getenv("GITHUB_SHA", "unknown"),
                     file.path("docs", "app", "BUILD_SHA.txt"))

      # ── Deploy ────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          clean: false
